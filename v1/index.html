<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinosaurio vs Cavernícola</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%);
            font-family: Arial, sans-serif;
        }
        #gameCanvas {
            border: 3px solid #8B4513;
            background: #90EE90;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        #gameOver {
            position: absolute;
            display: none;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
        }
        #gameOver h1 {
            margin: 0 0 20px 0;
            font-size: 48px;
        }
        #gameOver button {
            padding: 10px 30px;
            font-size: 20px;
            cursor: pointer;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
        }
        #gameOver button:hover {
            background: #45a049;
        }
        #score {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div id="score">Tiempo: 0s</div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="gameOver">
        <h1>¡El dinosaurio te atrapó!</h1>
        <p id="finalScore"></p>
        <button onclick="restartGame()">Jugar de nuevo</button>
    </div>
    <script src="game.js"></script>
</body>
</html>
